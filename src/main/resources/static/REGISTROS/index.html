<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lista de Pedidos</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, Helvetica, sans-serif;
}

body {
  background: #0f0820;
  color: #f5f3ff;
}

/* HEADER */
.header {
  background: #2e1065;
  padding: 18px;
  text-align: center;
  font-size: 24px;
  font-weight: bold;
  color: #facc15;
  box-shadow: 0 2px 12px rgba(0,0,0,0.5);
}

/* CONTAINER */
.container {
  max-width: 1100px;
  margin: 25px auto;
  padding: 15px;
}

/* CARD */
.card {
  background: #1e1b4b;
  border-radius: 16px;
  padding: 20px;
  box-shadow: 0 0 20px rgba(0,0,0,0.6);
}

/* TÍTULO */
.card h2 {
  margin-bottom: 20px;
  color: #facc15;
}

/* TABELA */
.table-wrapper {
  overflow-x: auto;
}

table {
  width: 100%;
  border-collapse: collapse;
  min-width: 700px;
}

thead {
  background: #312e81;
}

th, td {
  padding: 12px;
  text-align: left;
}

th {
  color: #facc15;
  font-weight: bold;
  font-size: 14px;
}

tbody tr {
  border-bottom: 1px solid #4338ca;
  transition: 0.2s;
}

tbody tr:hover {
  background: #312e81;
}

/* STATUS */
.badge {
  padding: 4px 10px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: bold;
}

.badge-pendente {
  background: #facc15;
  color: #1e1b4b;
}

.badge-entregue {
  background: #a855f7;
  color: white;
}

/* RESPONSIVO */
@media (max-width: 600px) {
  .header {
    font-size: 20px;
  }
}
</style>
</head>
<body>

<div class="header">
  📊 Pedidos Registrados
</div>

<div class="container">
  <div class="card">
    <h2>Lista de Pedidos</h2>

    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Cliente</th>
            <th>Telefone</th>
            <th>Quantidade</th>
            <th>Status</th>
            <th>Data</th>
          </tr>
        </thead>

        <tbody>
          <!-- EXEMPLOS (depois o backend preenche) -->
          <tr>
            <td>#001</td>
            <td>João Silva</td>
            <td>(11) 99999-9999</td>
            <td>12</td>
            <td><span class="badge badge-pendente">Pendente</span></td>
            <td>26/02/2026</td>
          </tr>

          <tr>
            <td>#002</td>
            <td>Maria Souza</td>
            <td>(11) 98888-7777</td>
            <td>30</td>
            <td><span class="badge badge-entregue">Entregue</span></td>
            <td>26/02/2026</td>
          </tr>

        </tbody>
      </table>
    </div>

  </div>
</div>

</body>
</html>
